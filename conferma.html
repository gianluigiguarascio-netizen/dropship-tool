<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordine Confermato — DropShop Italia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .confirm-page { text-align: center; padding: 80px 20px; min-height: 60vh; }
        .confirm-icon { font-size: 5rem; color: #00b894; margin-bottom: 20px; animation: scaleIn 0.5s ease; }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        .confirm-page h1 { font-size: 2rem; margin-bottom: 10px; }
        .confirm-page p { color: #636e72; font-size: 1.05rem; margin-bottom: 5px; }
        .order-id { background: #f5f6fa; display: inline-block; padding: 10px 25px; border-radius: 8px; font-weight: 700; font-size: 1.1rem; margin: 20px 0; color: #6c5ce7; }
        .order-details { max-width: 500px; margin: 30px auto; text-align: left; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .order-details h3 { margin-bottom: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
        .detail-row:last-child { border: none; font-weight: 700; font-size: 1.1rem; padding-top: 12px; }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo"><i class="fas fa-bolt"></i> DropShop</a>
    </div>
</header>

<section class="confirm-page">
    <div class="container">
        <div class="confirm-icon"><i class="fas fa-circle-check"></i></div>
        <h1>Ordine Confermato!</h1>
        <p>Grazie per il tuo acquisto. Riceverai un'email di conferma a breve.</p>
        <div class="order-id" id="orderId"></div>
        <div class="order-details" id="orderDetails"></div>
        <p style="margin-top:20px;font-size:0.9rem;color:#636e72;">
            <i class="fas fa-truck"></i> Spedizione stimata: 5-12 giorni lavorativi
        </p>
        <a href="index.html" class="btn btn-primary" style="margin-top:25px;">
            <i class="fas fa-home"></i> Torna alla Home
        </a>
    </div>
</section>

<script src="js/config.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId');

    document.getElementById('orderId').textContent = orderId || 'N/D';

    const orders = JSON.parse(localStorage.getItem('dropshop_orders') || '[]');
    const order = orders.find(o => o.id === orderId);

    if (order) {
        let html = `<h3>Riepilogo</h3>`;
        order.items.forEach(item => {
            html += `<div class="detail-row"><span>${item.name} x${item.qty}</span><span>${formatPrice(item.price * item.qty)}</span></div>`;
        });
        html += `<div class="detail-row"><span>Spedizione</span><span>${order.shipping === 0 ? 'Gratuita' : formatPrice(order.shipping)}</span></div>`;
        html += `<div class="detail-row"><span>Totale Pagato</span><span>${formatPrice(order.total)}</span></div>`;
        document.getElementById('orderDetails').innerHTML = html;
    }
</script>
</body>
</html>

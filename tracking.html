<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traccia il tuo Ordine — DropShop Italia</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .tracking-page { padding: 60px 0; min-height: 60vh; }
        .tracking-box {
            max-width: 600px; margin: 0 auto; background: #fff;
            border-radius: 12px; padding: 40px; box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .tracking-box h1 { text-align: center; margin-bottom: 10px; font-size: 1.6rem; }
        .tracking-box > p { text-align: center; color: #636e72; margin-bottom: 30px; }
        .tracking-input-group {
            display: flex; gap: 10px; margin-bottom: 30px;
        }
        .tracking-input-group input {
            flex: 1; padding: 14px 18px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 1rem; outline: none;
        }
        .tracking-input-group input:focus { border-color: #6c5ce7; }
        .tracking-input-group button {
            padding: 14px 28px; background: #6c5ce7; color: #fff;
            border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
            font-size: 0.95rem; transition: background 0.2s;
        }
        .tracking-input-group button:hover { background: #5a4bd1; }

        /* Timeline */
        .tracking-result { display: none; }
        .tracking-result.active { display: block; }
        .order-info-card {
            background: #f5f6fa; border-radius: 10px; padding: 20px; margin-bottom: 25px;
        }
        .order-info-card h3 { margin-bottom: 10px; color: #6c5ce7; }
        .order-info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; }
        .order-info-row span:first-child { color: #636e72; }

        .timeline { position: relative; padding-left: 30px; margin-top: 20px; }
        .timeline::before {
            content: ''; position: absolute; left: 10px; top: 5px; bottom: 5px;
            width: 2px; background: #e0e0e0;
        }
        .timeline-step { position: relative; padding-bottom: 25px; }
        .timeline-step:last-child { padding-bottom: 0; }
        .timeline-dot {
            position: absolute; left: -25px; top: 3px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #e0e0e0; border: 3px solid #fff; box-shadow: 0 0 0 2px #e0e0e0;
        }
        .timeline-step.active .timeline-dot { background: #00b894; box-shadow: 0 0 0 2px #00b894; }
        .timeline-step.current .timeline-dot { background: #6c5ce7; box-shadow: 0 0 0 2px #6c5ce7; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 2px #6c5ce7; } 50% { box-shadow: 0 0 0 6px rgba(108,92,231,0.2); } }
        .timeline-content h4 { font-size: 0.95rem; margin-bottom: 3px; }
        .timeline-content p { font-size: 0.8rem; color: #636e72; }

        .not-found { text-align: center; padding: 30px; color: #636e72; display: none; }
        .not-found.active { display: block; }
        .not-found i { font-size: 3rem; margin-bottom: 15px; color: #e0e0e0; }
    </style>
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo"><i class="fas fa-bolt"></i> DropShop</a>
        <div class="header-actions" style="margin-left:auto;">
            <a href="index.html" class="btn btn-secondary" style="font-size:0.85rem;">
                <i class="fas fa-arrow-left"></i> Torna al negozio
            </a>
        </div>
    </div>
</header>

<section class="tracking-page">
    <div class="container">
        <div class="tracking-box">
            <h1><i class="fas fa-truck-fast" style="color:#6c5ce7;"></i> Traccia il tuo Ordine</h1>
            <p>Inserisci il numero d'ordine ricevuto via email</p>

            <div class="tracking-input-group">
                <input type="text" id="trackingInput" placeholder="Es: ORD-1234567890">
                <button onclick="trackOrder()"><i class="fas fa-search"></i> Cerca</button>
            </div>

            <!-- Risultato -->
            <div class="tracking-result" id="trackingResult">
                <div class="order-info-card">
                    <h3 id="resultOrderId"></h3>
                    <div class="order-info-row"><span>Cliente:</span> <span id="resultCustomer"></span></div>
                    <div class="order-info-row"><span>Data ordine:</span> <span id="resultDate"></span></div>
                    <div class="order-info-row"><span>Totale:</span> <span id="resultTotal"></span></div>
                    <div class="order-info-row"><span>Spedizione a:</span> <span id="resultAddress"></span></div>
                </div>

                <h3 style="margin-bottom:5px;">Stato Spedizione</h3>
                <div class="timeline" id="timeline"></div>
            </div>

            <!-- Non trovato -->
            <div class="not-found" id="notFound">
                <i class="fas fa-box-open"></i>
                <p>Ordine non trovato. Verifica il numero e riprova.</p>
            </div>
        </div>
    </div>
</section>

<script src="js/config.js"></script>
<script>
    // Cerca anche premendo Enter
    document.getElementById('trackingInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') trackOrder();
    });

    function trackOrder() {
        const input = document.getElementById('trackingInput').value.trim();
        const resultDiv = document.getElementById('trackingResult');
        const notFound = document.getElementById('notFound');

        resultDiv.classList.remove('active');
        notFound.classList.remove('active');

        if (!input) return;

        const orders = JSON.parse(localStorage.getItem('dropshop_orders') || '[]');
        const order = orders.find(o => o.id === input || o.trackingNumber === input);

        if (!order) {
            notFound.classList.add('active');
            return;
        }

        // Mostra info ordine
        document.getElementById('resultOrderId').textContent = `Ordine ${order.id}`;
        document.getElementById('resultCustomer').textContent = order.customer ? `${order.customer.firstName} ${order.customer.lastName}` : 'N/D';
        document.getElementById('resultDate').textContent = new Date(order.date).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('resultTotal').textContent = formatPrice(order.total);
        document.getElementById('resultAddress').textContent = order.customer ? `${order.customer.address}, ${order.customer.city} ${order.customer.cap}` : 'N/D';

        // Timeline
        const steps = [
            { id: 'pending', label: 'Ordine Ricevuto', desc: 'Il tuo ordine è stato confermato' },
            { id: 'paid', label: 'Pagamento Confermato', desc: 'Pagamento ricevuto con successo' },
            { id: 'processing', label: 'In Preparazione', desc: 'Stiamo preparando il tuo pacco' },
            { id: 'shipped', label: 'Spedito', desc: order.trackingNumber ? `Tracking: ${order.trackingNumber}` : 'Il pacco è in viaggio' },
            { id: 'delivered', label: 'Consegnato', desc: 'Pacco consegnato al destinatario' }
        ];

        const statusOrder = ['pending', 'paid', 'processing', 'shipped', 'delivered'];
        const currentIndex = statusOrder.indexOf(order.status);

        const timeline = document.getElementById('timeline');
        timeline.innerHTML = steps.map((step, i) => {
            let cls = '';
            if (i < currentIndex) cls = 'active';
            else if (i === currentIndex) cls = 'current';
            return `
                <div class="timeline-step ${cls}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <h4>${step.label}</h4>
                        <p>${step.desc}</p>
                    </div>
                </div>`;
        }).join('');

        resultDiv.classList.add('active');
    }
</script>
</body>
</html>

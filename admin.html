<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin â€” DropShop Italia</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="admin-header">
  <h1>đź›  Admin â€” DropShop Italia</h1>
  <a href="index.html"><i class="fas fa-store"></i> Vai al negozio</a>
</div>
<div class="admin-main">

  <!-- AGGIUNGI -->
  <div class="box">
    <h2><i class="fab fa-amazon" style="color:#ff9900"></i> Aggiungi prodotto da Amazon</h2>
    <div class="fg">
      <label>URL Amazon *<input id="iUrl" placeholder="https://www.amazon.it/dp/B0..."></label>
      <label>Nome prodotto *<input id="iTitle" placeholder="Nome del prodotto"></label>
      <label>Prezzo â‚¬<input id="iPrice" type="number" step=".01" placeholder="19.99"></label>
      <label>Prezzo orig. â‚¬<input id="iOrig" type="number" step=".01" placeholder="29.99"></label>
      <label>&nbsp;<button class="btn btn-primary" onclick="add()"><i class="fas fa-plus"></i> Aggiungi</button></label>
    </div>
    <div class="img-row">
      <span style="font-size:.82rem;color:#666;white-space:nowrap">Immagine URL:</span>
      <input id="iImg" placeholder="https://m.media-amazon.com/images/...">
      <select id="iCat" style="padding:9px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:.9rem">
        <option value="elettronica">Elettronica</option>
        <option value="casa">Casa</option>
        <option value="moda">Moda</option>
        <option value="gadget">Gadget</option>
        <option value="sport">Sport</option>
      </select>
    </div>
  </div>

  <!-- TELEGRAM -->
  <div class="box">
    <h2><i class="fab fa-telegram" style="color:#0088cc"></i> Telegram</h2>
    <div class="tg-row">
      <input id="tToken" placeholder="Bot Token">
      <input id="tChan" placeholder="@dropshopofferte">
      <button class="btn btn-tg btn-sm" onclick="saveTg()"><i class="fas fa-save"></i> Salva</button>
      <button class="btn btn-sm" style="background:#eee" onclick="testTg()"><i class="fas fa-paper-plane"></i> Test</button>
    </div>
  </div>

  <!-- LISTA -->
  <div class="box">
    <h2><i class="fas fa-list"></i> Prodotti aggiunti manualmente (<span id="cnt">0</span>)</h2>
    <div style="overflow-x:auto"><table><thead><tr><th>Img</th><th>Nome</th><th>Prezzo</th><th>Sconto</th><th>ASIN</th><th>Azioni</th></tr></thead>
    <tbody id="tbl"></tbody></table></div>
    <p id="noItems" style="text-align:center;padding:24px;color:#aaa;display:none">Nessun prodotto aggiunto manualmente.<br>Il catalogo automatico Ă¨ visibile sul negozio.</p>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/catalog.js"></script>
<script>
const KEY='ds_manual_v1', TGK='ds_tg_v1';
const DEF_TOKEN='8548180810:AAEs1LTBMOXXiibvgQXfhUZoqtf8rm9qKpg';
const DEF_CHAN='@dropshopofferte';
const TAG='prezzotop08-21';

function load(){return JSON.parse(localStorage.getItem(KEY)||'[]')}
function save(a){localStorage.setItem(KEY,JSON.stringify(a))}
function getTg(){const s=JSON.parse(localStorage.getItem(TGK)||'{}');return{token:s.token||DEF_TOKEN,chan:s.chan||DEF_CHAN}}
function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(t==='ok'?'ok':t==='err'?'err':'');setTimeout(()=>el.className='toast',3200)}

function asin(url){const m=url.match(/\/dp\/([A-Z0-9]{10})/i)||url.match(/\/gp\/product\/([A-Z0-9]{10})/i);return m?m[1].toUpperCase():null}

function add(){
  const url=document.getElementById('iUrl').value.trim();
  const title=document.getElementById('iTitle').value.trim();
  const price=parseFloat(document.getElementById('iPrice').value);
  const orig=parseFloat(document.getElementById('iOrig').value)||0;
  const img=document.getElementById('iImg').value.trim();
  const cat=document.getElementById('iCat').value;
  if(!url){toast('Inserisci URL Amazon','err');return}
  const id=asin(url);
  if(!id){toast('URL non valido â€” deve contenere /dp/ASIN','err');return}
  if(!title){toast('Inserisci il nome','err');return}
  if(!price||price<=0){toast('Inserisci prezzo','err');return}
  const items=load();
  if(items.find(p=>p.asin===id)){toast('Prodotto giĂ  presente','err');return}
  items.unshift({asin:id,title,price,orig,img,cat,url:`https://www.amazon.it/dp/${id}?tag=${TAG}`,addedAt:new Date().toISOString()});
  save(items);render();toast('âś… Aggiunto!','ok');
  ['iUrl','iTitle','iPrice','iOrig','iImg'].forEach(x=>document.getElementById(x).value='');
}

function del(id){if(!confirm('Eliminare?'))return;save(load().filter(p=>p.asin!==id));render();toast('Eliminato')}

async function pub(id){
  const p=load().find(x=>x.asin===id)||CATALOG.find(x=>x.asin===id);
  if(!p)return;
  const {token,chan}=getTg();
  const disc=p.orig&&p.price?Math.round((1-p.price/p.orig)*100):0;
  const txt=`đź”Ą <b>OFFERTA AMAZON!</b>\n\n<b>${p.title}</b>\n\nđź’° Solo <b>â‚¬${p.price.toFixed(2)}</b>${p.orig?`\nâťŚ <s>â‚¬${p.orig.toFixed(2)}</s>`:''}${disc>0?`\nđź“‰ Sconto: <b>-${disc}%</b>`:''}\n\nđź›’ <a href="${p.url}">Vedi su Amazon â†’</a>\n\nđź“˘ @dropshopofferte`;
  try{
    let ok=false;
    if(p.img){
      const r=await fetch(`https://api.telegram.org/bot${token}/sendPhoto`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chan,photo:p.img,caption:txt,parse_mode:'HTML'})});
      ok=(await r.json()).ok;
    }
    if(!ok){
      const r=await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chan,text:txt,parse_mode:'HTML'})});
      ok=(await r.json()).ok;
    }
    toast(ok?'âś… Pubblicato su Telegram!':'âťŚ Errore Telegram',ok?'ok':'err');
  }catch{toast('âťŚ Errore di rete','err')}
}

function saveTg(){
  const t=document.getElementById('tToken').value.trim()||DEF_TOKEN;
  const c=document.getElementById('tChan').value.trim()||DEF_CHAN;
  localStorage.setItem(TGK,JSON.stringify({token:t,chan:c}));
  toast('âś… Salvato','ok');
}

async function testTg(){
  const {token,chan}=getTg();
  try{
    const r=await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chan,text:'âś… <b>DropShop Bot attivo!</b>\n\nBot connesso a '+chan,parse_mode:'HTML'})});
    const d=await r.json();
    toast(d.ok?'âś… Test inviato!':'âťŚ '+d.description,d.ok?'ok':'err');
  }catch{toast('âťŚ Errore rete','err')}
}

function render(){
  const items=load();
  document.getElementById('cnt').textContent=items.length;
  document.getElementById('noItems').style.display=items.length?'none':'block';
  document.getElementById('tbl').innerHTML=items.map(p=>{
    const disc=p.orig&&p.price?Math.round((1-p.price/p.orig)*100):0;
    return`<tr>
      <td>${p.img?`<img src="${p.img}" onerror="this.style.display='none'">`:'â€”'}</td>
      <td><strong>${p.title}</strong><br><small style="color:#aaa">${p.asin}</small></td>
      <td><strong>â‚¬${p.price.toFixed(2)}</strong>${p.orig?`<br><small style="text-decoration:line-through;color:#bbb">â‚¬${p.orig.toFixed(2)}</small>`:''}</td>
      <td>${disc>0?`<span style="background:#ffeaa7;color:#e17055;padding:2px 8px;border-radius:4px;font-size:.78rem;font-weight:700">-${disc}%</span>`:'â€”'}</td>
      <td><small>${p.asin}</small></td>
      <td><div class="actions">
        <button class="btn btn-tg btn-sm" onclick="pub('${p.asin}')"><i class="fab fa-telegram"></i> Pubblica</button>
        <a href="${p.url}" target="_blank" class="btn btn-sm" style="background:#ff9900;color:#fff"><i class="fab fa-amazon"></i></a>
        <button class="btn btn-del" onclick="del('${p.asin}')"><i class="fas fa-trash"></i></button>
      </div></td>
    </tr>`;
  }).join('');
}

window.addEventListener('DOMContentLoaded',()=>{
  render();
  // Mostra i prodotti del catalogo con pulsante pubblica
  const tbl=document.getElementById('tbl');
  if(!load().length){
    // mostra catalogo come sola lettura
  }
});
</script>
</body>
</html>
